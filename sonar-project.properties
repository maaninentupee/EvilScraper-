sonar.projectKey=maaninentupee_EvilScraper-
sonar.organization=maaninentupee

# Tämä on projektin nimi ja versio, jotka näkyvät SonarQubessa
sonar.projectName=AI Fallback System
sonar.projectVersion=1.0

# Lähdekoodi
sonar.sources=src
sonar.exclusions=node_modules/**,test/**,dist/**

# Testit
sonar.tests=test
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.spec.js,**/*.test.js

# Testikattavuus
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Koodin analysointi
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json
