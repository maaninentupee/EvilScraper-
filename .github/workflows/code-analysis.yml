name: Code Analysis & AI Optimization

on:
  push:
    branches:
      - main
      - develop
      - feature/*
  pull_request:
    branches:
      - main
      - develop

jobs:
  analyze:
    runs-on: macos-latest  # Vaihda 'ubuntu-latest', jos et tarvitse macOS:ää
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run SonarQube Analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch SonarQube Report
        run: |
          # Käytetään secrets.SONAR_TOKEN -arvoa ympäristömuuttujana
          SONAR_API_TOKEN="${{ secrets.SONAR_TOKEN }}"
          curl -u "${SONAR_API_TOKEN}:" \
          "https://sonarcloud.io/api/issues/search?componentKeys=maaninentupee_EvilScraper" \
          -o sonar-report.json
        continue-on-error: true

      - name: Upload Sonar Report
        uses: actions/upload-artifact@v2
        with:
          name: sonar-report
          path: sonar-report.json

  optimize:
    needs: analyze
    runs-on: macos-latest  # Vaihda 'ubuntu-latest', jos haluat nopeamman ympäristön
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download Sonar Report
        uses: actions/download-artifact@v2
        with:
          name: sonar-report

      - name: Run PearAI Optimization (only for SonarQube issues)
        run: |
          # Käytetään secrets.PEARAI_TOKEN -arvoa ympäristömuuttujana
          PEARAI_API_TOKEN="${{ secrets.PEARAI_TOKEN }}"
          curl -X POST "https://pearai.api/optimize" \
          -H "Authorization: Bearer ${PEARAI_API_TOKEN}" \
          -H "Content-Type: application/json" \
          -d @sonar-report.json > pearai-fixes.json

      - name: Apply AI Fixes to Detected Issues
        run: |
          git checkout -b ai-optimizations
          jq -r '.fixes[] | "echo \"\(.code)\" > \(.file)"' pearai-fixes.json | sh
          git add .
          git commit -m "AI Optimization from PearAI based on SonarQube analysis"
          git push origin ai-optimizations

      - name: Create Pull Request for AI Fixes
        uses: peter-evans/create-pull-request@v4
        with:
          title: "AI Optimizations from PearAI"
          body: "This PR contains automated fixes based on SonarQube analysis."
          branch: ai-optimizations
          token: ${{ secrets.GITHUB_TOKEN }}
