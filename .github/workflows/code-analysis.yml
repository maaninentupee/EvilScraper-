name: Code Analysis and Optimization

on:
  push:
    branches:
      - main  # Voit muuttaa tämän haluamaksesi

jobs:
  analyze-and-optimize:
    runs-on: macos-latest  # Vaihdettu macOS-runneriin

    steps:
      - name: 🛠️ Checkout repository
        uses: actions/checkout@v3

      - name: 🔍 Run SonarQube Analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: 🚀 Fetch SonarQube Report
        run: |
          curl -X GET "https://sonarcloud.io/api/issues/search" \
          -H "Authorization: Bearer ${{ secrets.SONAR_TOKEN }}" \
          -o sonar-report.json

      - name: 🔄 Send code issues to PearAI for optimization
        run: |
          # Käytetään PEARAI_TOKEN ympäristömuuttujana
          PEARAI_API_TOKEN="${{ secrets.PEARAI_TOKEN }}"
          curl -X POST "https://api.pearai.com/optimize" \
          -H "Authorization: Bearer ${PEARAI_API_TOKEN}" \
          -H "Content-Type: application/json" \
          -d @sonar-report.json

      - name: 📥 Retrieve Optimized Code from PearAI
        run: |
          # Käytetään PEARAI_TOKEN ympäristömuuttujana
          PEARAI_API_TOKEN="${{ secrets.PEARAI_TOKEN }}"
          curl -X GET "https://api.pearai.com/optimized-code" \
          -H "Authorization: Bearer ${PEARAI_API_TOKEN}" \
          -o optimized-code.zip
          unzip optimized-code.zip -d optimized/

      - name: 🔄 Commit Optimized Code
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git checkout -b pearai-optimized
          cp -r optimized/* .
          git add .
          git commit -m "♻️ PearAI optimized code based on SonarQube analysis"
          git push origin pearai-optimized

      - name: 🔀 Create Pull Request for Optimized Code
        uses: repo-sync/pull-request@v2
        with:
          source_branch: "pearai-optimized"
          destination_branch: "main"
          pr_title: "♻️ PearAI Optimized Code"
          pr_body: "This PR contains AI-optimized fixes based on SonarQube analysis."
          github_token: ${{ secrets.GITHUB_TOKEN }}
